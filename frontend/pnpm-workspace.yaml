packages:
  - locales
  - packages/*
  - components/**
  - '!**/test/**'

nodeLinker: hoisted

allowBuilds:
  '@bundled-es-modules/glob': false
  '@sentry/cli': false
  core-js: false
  electron: true
  esbuild: false
  style-dictionary: false
  vue-demi: false

catalog:
  '@vitejs/plugin-vue': ^6.0.3
  '@vitejs/plugin-vue-jsx': ^5.1.3
  ant-design-vue: ^4.2.6
  vue: "^3.5.24"
  vue-router: "^4.5.1"
  vite: ^8.0.0-beta.10
  tailwind-merge: ^3.4.0
  tailwindcss: "^3.4.4"
  tsdown: "^0.20.1"
  lodash-es: "^4.17.21"

ignoredBuiltDependencies:
  - '@bundled-es-modules/glob'
  - '@sentry/cli'
  - core-js
  - esbuild
  - style-dictionary
  - vue-demi

onlyBuiltDependencies:
  - electron

packageExtensions:
  browser-plugin:
    dependencies:
      vite: ^5.4.21
